name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  package-windows:
    name: Build Windows package
    if: github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer and portable package
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-package-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
